name: Build, Tag, and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    # Give the action permission to write tags back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to see all previous tags for versioning

      - name: Determine Next Version
        id: tagging
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Extract the major version number (e.g., from v1.0.0 extract 1)
          # This removes the 'v' and everything after the first dot
          MAJOR_VERSION=$(echo $LATEST_TAG | sed 's/v//' | cut -d. -f1)
          
          # Increment the major version
          NEXT_MAJOR=$((MAJOR_VERSION + 1))
          NEXT_TAG="v$NEXT_MAJOR.0.0"
          
          echo "Next tag: $NEXT_TAG"
          # Save as output for later steps
          echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git tag ${{ steps.tagging.outputs.next_tag }}
          git push origin ${{ steps.tagging.outputs.next_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with both 'latest' and your new incremental tag (v1.0.0, v2.0.0, etc.)
          tags: |
            arfa035/fa23-bcs-035:latest
            arfa035/fa23-bcs-035:${{ steps.tagging.outputs.next_tag }}
          provenance: false
          sbom: false
