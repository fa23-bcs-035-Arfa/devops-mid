name: CI/CD Docker Build and Push

on:
  push:
    branches: [ "main" ] # Triggers on push to the main branch
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest # GitHub-hosted runner (Free on standard plans)
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Use a PAT, not your password

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: arfa035/urdu-learner-app1:latest
          # These flags prevent the "400 Bad Request" metadata errors
          provenance: false
          sbom: false
